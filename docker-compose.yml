services:
  phlegethon:
    image: ${PHL_IMAGE_NAME:-phlegethon:ubuntu}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
        INSTALL_CMD: ${INSTALL_CMD:-}
        PYTHON_PACKAGES: "${PYTHON_PACKAGES:-numpy matplotlib scipy h5py ipython jupyterlab meson ninja}"
    environment:
      TEST_CASE: ${TEST_CASE:-tests/hotbubble}
      MPI_RANKS: ${MPI_RANKS:-4}
      OMPI_ALLOW_RUN_AS_ROOT: "1"
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"
    working_dir: /opt/phlegethon
    volumes:
      - ./:/opt/phlegethon
    tty: true
    stdin_open: true

  phlegethon-jupyter:
    image: ${PHL_IMAGE_NAME:-phlegethon:ubuntu}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
        INSTALL_CMD: ${INSTALL_CMD:-}
        PYTHON_PACKAGES: "${PYTHON_PACKAGES:-numpy matplotlib scipy h5py ipython jupyterlab meson ninja}"
    environment:
      JUPYTER_PORT: ${JUPYTER_PORT:-8888}
      OMPI_ALLOW_RUN_AS_ROOT: "1"
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"
    working_dir: /opt/phlegethon
    volumes:
      - ./:/opt/phlegethon
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    command: >
      bash -lc "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --ServerApp.token=''"
    tty: true
    stdin_open: true
